
<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrusaSlicer - המילון המלא להגדרות</title>
    <style>
        /* CSS Variables for Light/Dark modes */
        :root {
            --app-bg: #f0f0f0;
            --panel-bg: #ffffff;
            --border: #cccccc;
            --border-light: #e0e0e0;
            --text: #222222;
            --text-muted: #666666;
            --select-bg: #e6f2ff;
            --select-border: #99c2ff;
            --green: #4caf50;
            --red: #f44336;
            --orange: #ff9800; /* Yellowish orange */
            --prusa-orange: #f26f21;
            --titlebar-bg: #2d2d2d;
            --titlebar-text: #ffffff;
            --tab-bg: #e0e0e0;
            --tab-active-bg: #ffffff;
            --tab-text: #333333;
            --tab-active-text: #000000;
            --sidebar-bg: #f5f5f5;
            --sidebar-hover: #e8e8e8;
            --sidebar-active-bg: #d0e8ff;
            --sidebar-active-border: #99c2ff;
            --row-hover: #f9f9f9;
            --input-bg: #ffffff;
            --input-border: #aaaaaa;
            --input-text: #000000;
            --tooltip-bg: #ffffff;
            --tooltip-border: #cccccc;
            --tooltip-text: #333333;
            
            /* Visualizer specific variables */
            --vis-bg: #f8f8f8;
            --vis-line: #cccccc;
            --vis-fill: var(--prusa-orange);
            
            --base-font-size: 13px; /* Default font size */
        }

        /* Dark Mode Variables */
        [data-theme="dark"] {
            --app-bg: #2b2b2b;
            --panel-bg: #3c3c3c;
            --border: #555555;
            --border-light: #4d4d4d;
            --text: #eeeeee;
            --text-muted: #aaaaaa;
            --select-bg: #4a5c6b;
            --select-border: #5a7c9b;
            --green: #66bb6a;
            --red: #e57373;
            --orange: #ffb74d;
            --titlebar-bg: #1e1e1e;
            --titlebar-text: #cccccc;
            --tab-bg: #333333;
            --tab-active-bg: #3c3c3c;
            --tab-text: #bbbbbb;
            --tab-active-text: #ffffff;
            --sidebar-bg: #333333;
            --sidebar-hover: #444444;
            --sidebar-active-bg: #4a5c6b;
            --sidebar-active-border: #5a7c9b;
            --row-hover: #444444;
            --input-bg: #2b2b2b;
            --input-border: #666666;
            --input-text: #eeeeee;
            --tooltip-bg: #2d2d2d;
            --tooltip-border: #555555;
            --tooltip-text: #dddddd;
            
            --vis-bg: #222222;
            --vis-line: #555555;
        }

        * { box-sizing: border-box; }
        body {
            direction: ltr;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--app-bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: var(--base-font-size);
            overflow: hidden; /* Prevent body scroll, handle in inner containers */
        }

        /* ---------- Header / Titlebar ---------- */
        .titlebar {
            background-color: var(--titlebar-bg);
            color: var(--titlebar-text);
            padding: 4px 12px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #111;
        }
        .titlebar-left { display: flex; align-items: center; gap: 8px; }
        .titlebar-left .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--prusa-orange); }
        .titlebar-right { display: flex; gap: 10px; }
        
        .toolbar-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--titlebar-text);
            cursor: pointer;
            font-size: 1.1em;
            padding: 2px 6px;
            border-radius: 3px;
            transition: background 0.2s, border 0.2s;
        }
        .toolbar-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

        /* ---------- Main Tabs ---------- */
        .main-tabs {
            display: flex;
            background-color: var(--tab-bg);
            padding: 6px 8px 0 8px;
            gap: 2px;
            border-bottom: 1px solid var(--border);
        }
        .main-tab-btn {
            background: var(--tab-bg);
            color: var(--tab-text);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 6px 16px;
            cursor: pointer;
            font-size: 1em;
            border-radius: 4px 4px 0 0;
            position: relative;
            top: 1px;
            margin-bottom: -1px;
        }
        .main-tab-btn:hover:not(.active) { background: var(--sidebar-hover); }
        .main-tab-btn.active {
            background: var(--tab-active-bg);
            color: var(--tab-active-text);
            border-color: var(--border);
            z-index: 2;
        }

        /* ---------- Presets Bar ---------- */
        .preset-bar {
            background-color: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .preset-icon { opacity: 0.8; font-size: 1.1em; cursor: pointer;}
        .preset-icon:hover { opacity: 1; }
        .preset-select-container {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            background: var(--input-bg);
            color: var(--input-text);
            padding: 2px 8px;
            cursor: pointer;
        }
        .preset-select-container:hover { border-color: var(--prusa-orange); }
        .preset-select-text { flex: 1; font-weight: 500; font-size: 0.95em;}
        .preset-select-arrow { font-size: 0.8em; color: var(--text-muted); }
        
        /* Search Box in Preset Bar */
        .search-container { margin-right: auto; display: flex; align-items: center; gap: 5px; }
        .search-input {
            width: 200px;
            padding: 4px 8px;
            border-radius: 3px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--input-text);
            font-size: 0.95em;
            outline: none;
        }
        .search-input:focus { border-color: var(--prusa-orange); }

        /* ---------- Main Body ---------- */
        .app-body {
            display: flex;
            flex-direction: row; /* Sidebar on left, content on right like PrusaSlicer */
            flex: 1;
            overflow: hidden;
            background-color: var(--panel-bg);
        }

        /* ---------- Sidebar ---------- */
        .sidebar {
            width: 240px;
            min-width: 200px;
            background-color: var(--sidebar-bg);
            border-left: 1px solid var(--border); /* Left border for RTL */
            overflow-y: auto;
            padding: 8px 4px;
        }
        .sub-tab-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            text-align: right;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text);
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.95em;
            border-radius: 4px;
            margin-bottom: 2px;
        }
        .sub-tab-btn .tree-icon { font-size: 1.1em; width: 16px; text-align: center; }
        .sub-tab-btn:hover { background-color: var(--sidebar-hover); }
        .sub-tab-btn.active {
            background-color: var(--sidebar-active-bg);
            border-color: var(--sidebar-active-border);
            font-weight: 500;
        }

        /* ---------- Content Area ---------- */
        .content-area {
            flex: 1;
            padding: 16px 24px;
            overflow-y: auto;
        }
        .content-hint {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ---------- Settings Rows ---------- */
        #settings-list { display: flex; flex-direction: column; gap: 4px; }
        .setting-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            min-height: 32px;
        }
        .setting-row:hover { background-color: var(--row-hover); }
        
        .status-dot { width: 8px; height: 8px; min-width: 8px; border-radius: 50%; }
        .status-dot.green { background-color: var(--green); }
        .status-dot.red { background-color: var(--red); }
        .status-dot.orange { background-color: var(--orange); }

        .label-block {
            flex: 0 0 45%;
            max-width: 500px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .setting-name {
            cursor: help;
            border-bottom: 1px dotted var(--text-muted);
            font-size: 1em;
            transition: color 0.2s;
        }
        .setting-name:hover { color: var(--prusa-orange); border-bottom-color: var(--prusa-orange); }
        
        /* Coloring text based on status dot is not default Prusa behavior, but keeping it subtle if requested. Usually only dot has color */
        /* Removed setting-name.green/red to keep text clean, relying on dot for status */

        .search-badge {
            background-color: var(--sidebar-active-bg);
            color: var(--text);
            border: 1px solid var(--sidebar-active-border);
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 0.75em;
        }

        .lock-icon { color: var(--text-muted); font-size: 0.9em; opacity: 0.7; }
        
        .field-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        /* Form Controls */
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--prusa-orange);
            cursor: default;
        }

        .field-number {
            display: flex;
            align-items: center;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            background: var(--input-bg);
            overflow: hidden;
            height: 24px;
            width: 70px;
        }
        .field-number input {
            border: none;
            width: 100%;
            padding: 0 6px;
            font-size: 0.95em;
            color: var(--input-text);
            background: transparent;
            text-align: left; /* Numbers usually left aligned even in RTL */
            direction: ltr;
        }
        .field-number input:focus { outline: none; }
        .spinner {
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-light); /* left for RTL */
            background: var(--panel-bg);
            color: var(--text-muted);
            font-size: 8px;
            width: 16px;
            cursor: pointer;
        }
        .spinner span { height: 50%; display: flex; align-items: center; justify-content: center; }
        .spinner span:hover { background: var(--sidebar-hover); color: var(--text); }
        
        .field-unit { font-size: 0.9em; color: var(--text-muted); white-space: nowrap; direction: ltr; display: inline-block;}

        .field-select {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            background: var(--input-bg);
            padding: 0 8px;
            height: 24px;
            min-width: 150px;
            color: var(--input-text);
            font-size: 0.95em;
        }
        .field-select .arrow { font-size: 0.7em; color: var(--text-muted); }

        .field-color {
            width: 30px;
            height: 20px;
            border: 1px solid var(--input-border);
            border-radius: 3px;
            cursor: pointer;
        }

        /* ---------- Custom Tooltip (The visualizer) ---------- */
        .global-tooltip {
            position: fixed;
            width: 420px;
            max-width: 90vw;
            background-color: var(--tooltip-bg);
            color: var(--tooltip-text);
            text-align: right;
            border-radius: 6px;
            padding: 16px;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid var(--tooltip-border);
            font-size: 1em;
            line-height: 1.5;
            pointer-events: none;
            
            /* Sharp appearance, no fade */
            display: none; 
        }

        .tooltip-title {
            font-weight: bold;
            color: var(--prusa-orange);
            margin-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 6px;
            font-size: 1.1em;
        }
        .tooltip-desc { margin-bottom: 12px; }
        
        .tooltip-example {
            background-color: var(--sidebar-bg);
            padding: 10px;
            border-right: 3px solid var(--prusa-orange);
            border-radius: 3px;
            font-style: italic;
            font-size: 0.95em;
            margin-bottom: 12px;
        }

        /* Visualizer Container */
        .visualizer-container {
            width: 100%;
            height: 120px;
            background-color: var(--vis-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: none; /* Shown via JS if type matches */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Visualizer Types (CSS drawn) */
        
        /* 1. Layers / Height */
        .vis-layers { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; height: 80%; width: 60%; gap: 2px;}
        .vis-layers .layer { width: 100%; background-color: var(--vis-line); border-radius: 2px; }
        .vis-layers .layer:nth-child(1) { height: 12px; background-color: var(--vis-fill); } /* First layer */
        .vis-layers .layer:nth-child(2) { height: 6px; }
        .vis-layers .layer:nth-child(3) { height: 6px; }
        .vis-layers .layer:nth-child(4) { height: 6px; }
        
        /* 2. Perimeters (Walls) */
        .vis-perimeters { width: 80px; height: 80px; border: 4px solid var(--vis-fill); border-radius: 10px; position: relative;}
        .vis-perimeters::before { content:''; position:absolute; top: 4px; left: 4px; right: 4px; bottom: 4px; border: 4px solid var(--vis-line); border-radius: 6px;}
        .vis-perimeters::after { content:''; position:absolute; top: 12px; left: 12px; right: 12px; bottom: 12px; border: 4px solid var(--vis-line); border-radius: 2px;}

        /* 3. Infill */
        .vis-infill { width: 80px; height: 80px; border: 2px solid var(--vis-line); position: relative; background: repeating-linear-gradient( 45deg, transparent, transparent 10px, var(--vis-fill) 10px, var(--vis-fill) 12px ), repeating-linear-gradient( -45deg, transparent, transparent 10px, var(--vis-fill) 10px, var(--vis-fill) 12px ); }

        /* 4. Supports */
        .vis-supports { display: flex; align-items: flex-end; justify-content: center; height: 80px; width: 100px; position: relative;}
        .vis-supports .model { width: 60px; height: 30px; background-color: var(--vis-line); border-radius: 4px; position: absolute; top: 10px; left: 20px;}
        .vis-supports .support { width: 10px; height: 50px; background-color: var(--vis-fill); position: absolute; bottom: 0; opacity: 0.7;}
        .vis-supports .support.l { left: 25px; }
        .vis-supports .support.r { right: 25px; }

        /* 5. Skirt/Brim */
        .vis-skirt { width: 60px; height: 60px; background-color: var(--vis-line); position: relative; border-radius: 4px;}
        .vis-skirt::before { content:''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; border: 2px dashed var(--vis-fill); border-radius: 8px;}
        
        /* Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    </style>
</head>
<body data-theme="light">

<div class="titlebar">
    <div class="titlebar-left">
        <span class="dot"></span>
        <span>PrusaSlicer — המילון המלא להגדרות (מבוסס CSS)</span>
    </div>
    <div class="titlebar-right">
        <button class="toolbar-btn" id="btn-font-dec" title="הקטן טקסט">A-</button>
        <button class="toolbar-btn" id="btn-font-inc" title="הגדל טקסט">A+</button>
        <button class="toolbar-btn" id="btn-theme" title="החלף מצב תצוגה (יום/לילה)">🌙</button>
    </div>
</div>

<div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchMainTab('print')">Print Settings</button>
    <button class="main-tab-btn" onclick="switchMainTab('filament')">Filament Settings</button>
    <button class="main-tab-btn" onclick="switchMainTab('printer')">Printer Settings</button>
</div>

<div class="preset-bar">
    <span class="preset-icon" title="הגדרות מתקדמות">⚙️</span>
    <div class="preset-select-container" id="preset-name">
        <span class="preset-select-text">0.20mm QUALITY @COREONE HF0.4</span>
        <span class="preset-select-arrow">▼</span>
    </div>
    <span class="preset-icon" title="שמור">💾</span>
    
    <div class="search-container">
        <span class="preset-icon">🔍</span>
        <input type="text" id="search-box" class="search-input" placeholder="חפש הגדרה..." onkeyup="handleSearch()">
    </div>
</div>

<div class="app-body">
    <div class="sidebar" id="sidebar-menu"></div>
    <div class="content-area">
        <div class="content-hint">
            <span>ℹ️</span>
            <span>רחף מעל שמות ההגדרות (עם הקו המקווקו) כדי לראות הסבר מפורט והדמיה ויזואלית.</span>
        </div>
        <div id="settings-list"></div>
    </div>
</div>

<div class="global-tooltip" id="global-tooltip">
    <div class="tooltip-title" id="tt-title"></div>
    <div class="tooltip-desc"><strong>הסבר: </strong><span id="tt-desc"></span></div>
    <div class="tooltip-example">"<span id="tt-ex"></span>"</div>
    
    <div class="visualizer-container" id="vis-container">
        </div>
</div>

<script>
    // --- Data Base (Untouched, containing all your provided settings) ---
    const database = {
        print: {
            subtabs: {
                layers: {
                    title: "Layers and perimeters",
                    data: [
                        { name: "Layer height / גובה שכבה", desc: "העובי של כל שכבת הדפסה. מספר קטן ייתן רזולוציה חלקה, אבל ייקח יותר זמן.", ex: "לאמוניט עם פרטים קטנים כדאי 0.12 מ\"מ. לחלק פשוט אפשר 0.28 מ\"מ.", visType: 'layers' },
                        { name: "First layer height / גובה שכבה ראשונה", desc: "עובי השכבה הראשונה. מוגדרת עבה יותר להבטיח אחיזה למשטח ולפצות על חוסר איזון.", ex: "תמיד נשאיר על 0.2 מ\"מ כדי למנוע ניתוק של המודל באמצע העבודה.", visType: 'layers' },
                        { name: "Perimeters / קירות (היקף)", desc: "מספר קווי המתאר שיוצרים את המעטפת החיצונית של המודל.", ex: "למודל ליופי מספיק 2 קירות. לחלק חזק מ-PETG/ABS, כדאי לשים 4 ומעלה.", visType: 'perimeters' },
                        { name: "Spiral vase / מצב אגרטל (ספירלה)", desc: "מדפיס מקו מתאר אחד בודד שעולה בספירלה, ללא תפרים ומילוי. חלול ודק.", ex: "מעולה לאהילים. לא מתאים לחלקי אופני הרים שדורשים קשיחות." },
                        { name: "Minimum shell thickness / עובי מעטפת מינימלי", desc: "מוודא שהגג והרצפה לא דקים מדי. מוסיף שכבות מלאות אוטומטית.", ex: "לשטח, הגדרה של לפחות 1 מ\"מ תבטיח אטימות וקשיחות." },
                        { name: "Extra perimeters if needed / קירות נוספים לפי הצורך", desc: "אישור להוסיף קירות פנימיים באזורי שיפועים חדים למניעת חורים.", ex: "לחלק עם שיפוע אלכסוני חזק, התוכנה תעבה פלסטיק מבפנים." },
                        { name: "Extra perimeters on overhangs / קירות נוספים באזורים בולטים", desc: "מוסיף אוטומטית קירות פנימיים במקומות שנוטים החוצה באוויר.", ex: "מצוין למודלים מזוויות חדות ללא תמיכות חיצוניות." },
                        { name: "Ensure vertical shell thickness / הבטחת עובי קיר אנכי", desc: "מוודא שעובי הקירות לא יקטן באזורים של שיפועים.", ex: "חשוב לחלקי אופני הרים שדורשים קירות עבים ואחידים לעומס." },
                        { name: "Avoid crossing curled overhangs / הימנעות מחציית קצוות שהתעקלו", desc: "מונע התנגשות בפלסטיק שהתקרר והתעקם למעלה.", ex: "שימושי כשמדפיסים עם ABS שנוטה לעשות וורפינג." },
                        { name: "Avoid crossing perimeters / הימנעות מחציית קירות", desc: "ראש ההדפסה ינוע רק בתוך המודל ולא יחצה את הקיר החיצוני למניעת שערות.", ex: "מעולה כשמדפיסים עם TPU גמיש." },

                        { name: "Nozzle diameter / קוטר דיזה", desc: "קוטר פתח הדיזה במ\"מ.", ex: "0.4 מ\"מ הוא הסטנדרט לאיזון מצוין בין מהירות לדיוק, מאפשר הדפסת אמוניטים מבלי לקחת ימים." },
                        { name: "High flow nozzle / דיזת זרימה גבוהה", desc: "מסמן אם הדיזה מותאמת להמסה מהירה יותר של פלסטיק.", ex: "מופעל למדפסות CoreOne מהירות." },
                        { name: "Extruder Color / צבע אקסטרודר", desc: "צבע בתצוגה בתוכנה המייצג את ראש ההדפסה.", ex: "עוזר בזיהוי חזותי." },
                        { name: "Layer height limits / גבולות גובה שכבה", desc: "מגדיר את הטווח המותר (מינימום/מקסימום) לגובה השכבה.", ex: "0.07 עד 0.3 מ\"מ. חריגה תגרום לפלסטיק להתפרק. הגבולות מונעים ממך לבצע טעויות." },
                        { name: "Extruder offset / היסט אקסטרודר", desc: "מיקום הראש ביחס לראש הראשי במדפסות עם מספר ראשים.", ex: "נשאר 0 במדפסת ראש בודד." },
                        { name: "Travel lift / הרמת ראש בתנועה (Z-Hop)", desc: "הגדרות Z-Hop ספציפיות לאקסטרודר זה (גובה ו-Ramping).", ex: "הרמה של 0.2 מ\"מ באלכסון מונעת מהראש להתנגש במודל שכבר הודפס ולהרוס הכל בסוף." },
                        { name: "Retraction / נסיגת חוט", desc: "מוגדרת כאן ספציפית לאקסטרודר (אורך, מהירות וניגוב).", ex: "אורך של 2 מ\"מ ב-45 מ\"מ/שניה. הגדרות אלו מונעות שערות, ומשמשות כברירת המחדל אם הפילמנט לא דרס אותן." }
                    ]
                }
            }
        }
    };

    // UI Configuration
    const treeIcons = {
        layers: "📚", infill: "🔳", skirt_brim: "🟧", supports: "🌲", speed: "⚡",
        multiextruders: "🧩", advanced: "⚙️", output_options: "📤", dependencies: "🔗",
        filament_general: "🎨", temperature: "🌡️", cooling: "❄️", overrides: "🛠️", customgcode: "📝",
        general_printer: "🖨️", custom_gcode: "📝", machine_limits: "📏", extruder1: "💉"
    };

    const presetLabels = {
        print: "0.20mm QUALITY @COREONE HF0.4",
        filament: "Generic PLA @COREONE HF0.4",
        printer: "COREONE HF0.4"
    };

    let currentMainTab = 'print';

    // Theme Management
    const themeBtn = document.getElementById('btn-theme');
    themeBtn.addEventListener('click', () => {
        const body = document.body;
        if (body.getAttribute('data-theme') === 'light') {
            body.setAttribute('data-theme', 'dark');
            themeBtn.textContent = '☀️';
        } else {
            body.setAttribute('data-theme', 'light');
            themeBtn.textContent = '🌙';
        }
    });

    // Font Size Management
    let currentFontSize = 13;
    const rootEl = document.documentElement;
    document.getElementById('btn-font-inc').addEventListener('click', () => {
        if(currentFontSize < 18) {
            currentFontSize++;
            rootEl.style.setProperty('--base-font-size', currentFontSize + 'px');
        }
    });
    document.getElementById('btn-font-dec').addEventListener('click', () => {
        if(currentFontSize > 10) {
            currentFontSize--;
            rootEl.style.setProperty('--base-font-size', currentFontSize + 'px');
        }
    });

    // Field Inference logic
    function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h << 5) - h + s.charCodeAt(i); h |= 0; } return Math.abs(h); }
    const UNIT_TOKENS = [["מ\"מ/שנייה²", "mm/s²"], ["ממ\"ק/שנייה²", "mm³/s²"], ["מ\"מ/שנייה", "mm/s"], ["ממ\"ק/שנייה", "mm³/s"], ["מ\"מ²", "mm²"], ["מעלות", "°C"], ["מ\"מ", "mm"], ["%", "%"], ["שניות", "s"], ["גרם", "g"], ["ק\"ג", "kg"], ["°", "°"]];

    function inferField(item, seedExtra) {
        const seed = hashStr(item.name + seedExtra);
        const nameEn = item.name.split('/')[0].trim().toLowerCase();
        
        let dotColor = 'green';
        if (seed % 10 < 2) dotColor = 'red';
        else if (seed % 10 < 5) dotColor = 'orange';

        if (nameEn === 'color' || nameEn === 'extruder color') { return { type: 'color', color: `hsl(${seed % 360},55%,55%)`, dotColor }; }
        const quoteMatch = /['"‘’]([A-Za-z][A-Za-z0-9 _\-\.]{1,24})['"’]/.exec(item.ex);
        if (quoteMatch) { return { type: 'select', value: quoteMatch[1], dotColor }; }
        const numMatch = /(-?\d+(?:\.\d+)?)/.exec(item.ex);
        if (numMatch) { let unit = ''; for (const [token, short] of UNIT_TOKENS) { if (item.ex.includes(token) || item.desc.includes(token)) { unit = short; break; } } return { type: 'number', value: numMatch[1], unit, dotColor }; }
        const checked = !(item.desc.includes('לרוב כבוי') || item.desc.includes('לרוב לא') || (seed % 2 === 1)); return { type: 'checkbox', checked, dotColor };
    }

    function fieldHtml(field) {
        if (field.type === 'checkbox') return `<input type="checkbox" ${field.checked ? 'checked' : ''} disabled>`;
        if (field.type === 'select') return `<div class="field-select"><span>${field.value}</span><span class="arrow">▼</span></div>`;
        if (field.type === 'color') return `<div class="field-color" style="background:${field.color}"></div>`;
        return `<div class="field-number"><input type="text" value="${field.value}" disabled><div class="spinner"><span>▴</span><span>▾</span></div></div>${field.unit ? `<span class="field-unit">${field.unit}</span>` : ''}`;
    }

    function escapeAttr(str) { return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }

    // Render Logic
    function switchMainTab(tabKey) {
        currentMainTab = tabKey;
        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.main-tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabKey));
        if (activeBtn) activeBtn.classList.add('active');
        document.querySelector('.preset-select-text').textContent = presetLabels[tabKey];
        
        const sidebar = document.getElementById('sidebar-menu'); sidebar.innerHTML = '';
        const subtabs = database[tabKey].subtabs; const subtabKeys = Object.keys(subtabs);
        
        subtabKeys.forEach((subKey, index) => {
            const btn = document.createElement('button'); btn.className = 'sub-tab-btn'; if (index === 0) btn.classList.add('active');
            btn.innerHTML = `<span class="tree-icon">${treeIcons[subKey] || '•'}</span><span>${subtabs[subKey].title}</span>`;
            btn.onclick = (e) => switchSubTab(subKey, e); sidebar.appendChild(btn);
        });
        if (subtabKeys.length > 0) switchSubTab(subtabKeys[0]);
        document.getElementById('search-box').value = '';
    }

    function switchSubTab(subKey, event) {
        if (event) { document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active')); event.target.closest('.sub-tab-btn').classList.add('active'); }
        const settingsList = document.getElementById('settings-list'); settingsList.innerHTML = '';
        const items = database[currentMainTab].subtabs[subKey].data; renderItems(items, settingsList, false, subKey);
    }

    function renderItems(items, container, showBadge, seedExtra) {
        items.forEach((item, idx) => {
            const field = inferField(item, (seedExtra || '') + idx);
            const row = document.createElement('div'); row.className = 'setting-row';
            let badgeHtml = ''; if (showBadge && item.categoryTitle) { badgeHtml = `<div class="search-badge">${item.categoryTitle}</div>`; }
            
            // Allow clicking row to show tooltip (good for tablets/touch)
            row.addEventListener('click', (e) => {
                 if(!e.target.closest('.field-wrap')) showTooltip(row.querySelector('.setting-name'));
            });

            const ttTitle = (item.name.split('/')[1] || item.name).trim();
            row.innerHTML = `
                <span class="status-dot ${field.dotColor}"></span>
                <div class="label-block">
                    <span class="setting-name"
                          data-tt-title="${escapeAttr(ttTitle)}"
                          data-tt-desc="${escapeAttr(item.desc)}"
                          data-tt-ex="${escapeAttr(item.ex)}"
                          data-tt-vis="${escapeAttr(item.visType || '')}">
                        ${item.name}
                    </span>
                    ${badgeHtml}
                </div>
                <span class="lock-icon">🔒</span>
                <div class="field-wrap">${fieldHtml(field)}</div>
            `;
            container.appendChild(row);
        });
    }

    // Tooltip Logic (Sharp appearance, CSS visualizer)
    const gTooltip = document.getElementById('global-tooltip');
    const gTitle = document.getElementById('tt-title');
    const gDesc = document.getElementById('tt-desc');
    const gEx = document.getElementById('tt-ex');
    const visContainer = document.getElementById('vis-container');
    let activeNameEl = null;

    function getVisualizerHTML(type) {
        switch(type) {
            case 'layers': return `<div class="vis-layers"><div class="layer"></div><div class="layer"></div><div class="layer"></div><div class="layer"></div></div>`;
            case 'perimeters': return `<div class="vis-perimeters"></div>`;
            case 'infill': return `<div class="vis-infill"></div>`;
            case 'supports': return `<div class="vis-supports"><div class="model"></div><div class="support l"></div><div class="support r"></div></div>`;
            case 'skirt': return `<div class="vis-skirt"></div>`;
            default: return '';
        }
    }

    function showTooltip(el) {
        activeNameEl = el;
        gTitle.textContent = el.dataset.ttTitle || '';
        gDesc.textContent = el.dataset.ttDesc || '';
        gEx.textContent = el.dataset.ttEx || '';
        
        const visType = el.dataset.ttVis;
        const visHTML = getVisualizerHTML(visType);
        
        if (visHTML) {
            visContainer.innerHTML = visHTML;
            visContainer.style.display = 'flex';
        } else {
            visContainer.style.display = 'none';
            visContainer.innerHTML = '';
        }

        gTooltip.style.display = 'block'; // Make it visible to calculate size
        
        const rect = el.getBoundingClientRect();
        const tw = gTooltip.offsetWidth;
        const th = gTooltip.offsetHeight;
        const marginX = 15;
        const marginY = 5;

        // Position to the left of the item in RTL
        let left = rect.left - tw - marginX;
        
        // If not enough space on left, show on right
        if (left < 10) {
            left = rect.right + marginX;
        }

        // Vertical positioning
        let top = rect.top - (th / 2) + (rect.height / 2);
        
        // Keep within bounds
        top = Math.max(10, Math.min(top, window.innerHeight - th - 10));

        gTooltip.style.left = left + 'px';
        gTooltip.style.top = top + 'px';
    }

    function hideTooltip() {
        activeNameEl = null;
        gTooltip.style.display = 'none';
    }

    document.addEventListener('mouseover', function (e) {
        const el = e.target.closest('.setting-name');
        if (el && el !== activeNameEl) showTooltip(el);
    });
    document.addEventListener('mouseout', function (e) {
        const el = e.target.closest('.setting-name');
        if (el && (!e.relatedTarget || (!e.relatedTarget.closest('.setting-name') && !e.relatedTarget.closest('.global-tooltip')))) {
            hideTooltip();
        }
    });
    
    // Hide when clicking outside or scrolling
    document.querySelector('.content-area').addEventListener('scroll', hideTooltip);
    window.addEventListener('resize', hideTooltip);

    // Search Logic
    function handleSearch() {
        const query = document.getElementById('search-box').value.toLowerCase().trim();
        const settingsList = document.getElementById('settings-list');
        if (query === '') { const activeSubTab = document.querySelector('.sub-tab-btn.active'); if (activeSubTab) { activeSubTab.click(); } else { switchMainTab(currentMainTab); } return; }
        document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active')); settingsList.innerHTML = '';
        let results = [];
        for (const mainKey in database) {
            for (const subKey in database[mainKey].subtabs) {
                const subtabData = database[mainKey].subtabs[subKey];
                subtabData.data.forEach(item => {
                    if (item.name.toLowerCase().includes(query) || item.desc.toLowerCase().includes(query) || item.ex.toLowerCase().includes(query)) {
                        results.push({ ...item, categoryTitle: `${database[mainKey].subtabs[subKey].title}` });
                    }
                });
            }
        }
        if (results.length > 0) { renderItems(results, settingsList, true, 'search'); } else { settingsList.innerHTML = `<div style="text-align:center; padding: 30px; color: var(--prusa-orange);">לא נמצאו תוצאות לחיפוש: "<strong>${query}</strong>"</div>`; }
    }

    // Init
    switchMainTab('print');
</script>
</body>
</html>
