<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrusaSlicer - המילון המלא להגדרות</title>
    <style>
        :root {
            --prusa-orange: #e76f51;
            --bg-main: #202225;
            --bg-sidebar: #2f3136;
            --bg-content: #36393f;
            --text-main: #dcddde;
            --text-light: #ffffff;
            --border-color: #4f545c;
            --tooltip-bg: #f4f1de;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2f3136;
            border-bottom: 3px solid var(--prusa-orange);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--prusa-orange);
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #b9bbbe;
        }

        .search-container {
            width: 100%;
            background-color: #2f3136;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .search-input {
            width: 50%;
            max-width: 500px;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-main);
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        .search-input:focus {
            border-color: var(--prusa-orange);
            box-shadow: 0 0 5px rgba(231, 111, 81, 0.5);
        }
        
        .main-tabs {
            display: flex;
            background-color: #2f3136;
            padding: 0 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .main-tab-btn {
            background: none;
            color: #b9bbbe;
            border: none;
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .main-tab-btn:hover {
            color: var(--text-light);
            background-color: rgba(255,255,255,0.05);
        }

        .main-tab-btn.active {
            color: var(--prusa-orange);
            border-bottom: 3px solid var(--prusa-orange);
            background-color: rgba(231, 111, 81, 0.05);
        }

        .app-body {
            display: flex;
            flex-direction: row-reverse; /* מכריח את התפריט להיות בצד שמאל ב-RTL */
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-color); /* קו בצד ימין של התפריט */
            overflow-y: auto;
            padding-top: 10px;
        }

        .sub-tab-btn {
            display: block;
            width: 100%;
            text-align: right;
            background: none;
            border: none;
            color: #b9bbbe;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.1s;
            border-left: 4px solid transparent; /* פס סימון בצד שמאל */
        }

        .sub-tab-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-light);
        }

        .sub-tab-btn.active {
            color: var(--text-light);
            background-color: #40444b;
            font-weight: bold;
            border-left: 4px solid var(--prusa-orange);
        }

        .content-area {
            flex: 1;
            background-color: var(--bg-content);
            padding: 20px;
            overflow-y: auto;
        }

        .settings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .settings-table th {
            text-align: right;
            background-color: #2f3136;
            color: var(--prusa-orange);
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .settings-table td {
            padding: 15px 12px;
            border: 1px solid var(--border-color);
            vertical-align: top;
        }

        .setting-row:nth-child(even) {
            background-color: rgba(255,255,255,0.02);
        }

        .setting-name {
            font-weight: bold;
            color: var(--text-light);
            cursor: help;
            position: relative;
            display: inline-block;
            border-bottom: 1px dashed #b9bbbe;
            padding-bottom: 2px;
            font-size: 14px;
        }

        .setting-name:hover {
            color: var(--prusa-orange);
            border-bottom-color: var(--prusa-orange);
        }

        .tooltip {
            visibility: hidden;
            width: 400px;
            background-color: var(--tooltip-bg);
            color: #2b2d42;
            text-align: right;
            border-radius: 8px;
            padding: 15px;
            position: absolute;
            z-index: 999;
            bottom: 130%;
            right: 0;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.2s;
            border: 3px solid var(--prusa-orange);
            font-size: 14px;
            line-height: 1.6;
            font-weight: normal;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 30px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--prusa-orange) transparent transparent transparent;
        }

        .setting-name:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-title {
            font-weight: bold;
            color: #e76f51;
            margin-bottom: 10px;
            border-bottom: 2px solid #2b2d42;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .tooltip-example {
            margin-top: 12px;
            background-color: rgba(231, 111, 81, 0.12);
            padding: 10px;
            border-right: 4px solid var(--prusa-orange);
            border-radius: 4px;
            font-weight: 500;
        }
        
        .search-badge {
            display: inline-block;
            background-color: rgba(231, 111, 81, 0.2);
            color: var(--prusa-orange);
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<header>
    <h1>PrusaSlicer - המילון המלא להגדרות</h1>
    <p>העבר את סמן העכבר מעל המונחים כדי לחשוף את ההסבר המלא והדוגמאות</p>
</header>

<div class="search-container">
    <input type="text" id="search-box" class="search-input" placeholder="חיפוש הגדרה חופשי..." onkeyup="handleSearch()">
</div>

<div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchMainTab('print')">הגדרות הדפסה (Print Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('filament')">הגדרות פילמנט (Filament Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('printer')">הגדרות מדפסת (Printer Settings)</button>
</div>

<div class="app-body">
    <div class="sidebar" id="sidebar-menu"></div>
    <div class="content-area">
        <table class="settings-table">
            <thead>
                <tr>
                    <th style="width: 35%;">שם ההגדרה (אנגלית / עברית)</th>
                    <th style="width: 65%;">תיאור</th>
                </tr>
            </thead>
            <tbody id="settings-list"></tbody>
        </table>
    </div>
</div>

<script>
    const database = {
        print: {
            subtabs: {
                layers: {
                    title: "שכבות והיקפים (Layers & perimeters)",
                    data: [
                        { name: "Layer height / גובה שכבה", desc: "העובי של כל שכבת הדפסה. מספר קטן ייתן רזולוציה חלקה, אבל ייקח יותר זמן.", ex: "לאמוניט עם פרטים קטנים כדאי 0.12 מ\"מ. לחלק פשוט אפשר 0.28 מ\"מ." },
                        { name: "First layer height / גובה שכבה ראשונה", desc: "עובי השכבה הראשונה. מוגדרת עבה יותר להבטיח אחיזה למשטח ולפצות על חוסר איזון.", ex: "תמיד נשאיר על 0.2 מ\"מ כדי למנוע ניתוק של המודל באמצע העבודה." },
                        { name: "Perimeters / קירות (היקף)", desc: "מספר קווי המתאר שיוצרים את המעטפת החיצונית של המודל.", ex: "למודל ליופי מספיק 2 קירות. לחלק חזק מ-PETG/ABS, כדאי לשים 4 ומעלה." },
                        { name: "Spiral vase / מצב אגרטל (ספירלה)", desc: "מדפיס מקו מתאר אחד בודד שעולה בספירלה, ללא תפרים ומילוי. חלול ודק.", ex: "מעולה לאהילים. לא מתאים לחלקי אופני הרים שדורשים קשיחות." },
                        { name: "Minimum shell thickness / עובי מעטפת מינימלי", desc: "מוודא שהגג והרצפה לא דקים מדי. מוסיף שכבות מלאות אוטומטית.", ex: "לשטח, הגדרה של לפחות 1 מ\"מ תבטיח אטימות וקשיחות." },
                        { name: "Extra perimeters if needed / קירות נוספים לפי הצורך", desc: "אישור להוסיף קירות פנימיים באזורי שיפועים חדים למניעת חורים.", ex: "לחלק עם שיפוע אלכסוני חזק, התוכנה תעבה פלסטיק מבפנים." },
                        { name: "Extra perimeters on overhangs / קירות נוספים באזורים בולטים", desc: "מוסיף אוטומטית קירות פנימיים במקומות שנוטים החוצה באוויר.", ex: "מצוין למודלים מזוויות חדות ללא תמיכות חיצוניות." },
                        { name: "Ensure vertical shell thickness / הבטחת עובי קיר אנכי", desc: "מוודא שעובי הקירות לא יקטן באזורים של שיפועים.", ex: "חשוב לחלקי אופני הרים שדורשים קירות עבים ואחידים לעומס." },
                        { name: "Avoid crossing curled overhangs / הימנעות מחציית קצוות שהתעקלו", desc: "מונע התנגשות בפלסטיק שהתקרר והתעקם למעלה.", ex: "שימושי כשמדפיסים עם ABS שנוטה לעשות וורפינג." },
                        { name: "Avoid crossing perimeters / הימנעות מחציית קירות", desc: "ראש ההדפסה ינוע רק בתוך המודל ולא יחצה את הקיר החיצוני למניעת שערות.", ex: "מעולה כשמדפיסים עם TPU גמיש." },
                        { name: "Avoid crossing perimeters - Max detour length / אורך מעקף מקסימלי", desc: "קובע כמה רחוק המדפסת יכולה לעשות סיבוב בתוך המודל כדי לא לחצות קיר.", ex: "לרוב עדיף להשאיר על 0 (ללא הגבלה) להבטיח מודל נקי." },
                        { name: "Detect thin walls / זיהוי קירות דקים", desc: "מאפשר ניסיון להדפיס קירות שדקים יותר מהחור של הדיזה.", ex: "פחות רלוונטי לחלקים הנדסיים מ-PETG." },
                        { name: "Thick bridges / גשרים עבים", desc: "מדפיס פלסטיק עבה יותר במתיחת קו ישר באוויר כדי שלא יצנח.", ex: "שימושי אם יש חור להעברת כבל בתושבת." },
                        { name: "Detect bridging perimeters / זיהוי קירות מגשרים", desc: "מזהה מתי קיר חיצוני מודפס באוויר ומתאים את המהירות.", ex: "מומלץ להשאיר פועל לזוויות יפות." },
                        { name: "Seam position / מיקום התפר", desc: "קובע איפה תהיה נקודת ההתחלה והסיום של השכבה.", ex: "לאמוניט כדאי 'Aligned' לפס אחיד. לעיגולים לפעמים 'Random'." },
                        { name: "Seam gap distance / מרחק רווח התפר", desc: "כמה רווח להשאיר בסוף כל שכבה למניעת הצטברות לגוש בנקודת התפר.", ex: "ברירת המחדל (15%) לרוב נותנת גימור יפה." },
                        { name: "Staggered inner seams / תפרים פנימיים מדורגים", desc: "מפזר את התפרים של הקירות הפנימיים במקומות שונים.", ex: "חובה לחלקים מכניים לאופניים למניעת נקודת שבירה." },
                        { name: "Scarf joint / הגדרות חיבור מוסתר", desc: "חיבור אלכסוני במקום תפר רגיל להעלמתו לגמרי.", ex: "שווה להפעיל למודלים שנמכרים בדוכן ודורשים נראות חלקה לחלוטין." },
                        { name: "External perimeters first / קירות חיצוניים קודם", desc: "מדפיס קודם את הקיר החיצוני ואז את הפנימיים לדיוק מידות.", ex: "לחלק מ-ABS שמשתלב בצינור אלומיניום, זה יעזור לדייק." },
                        { name: "Fill gaps / מילוי רווחים", desc: "ממלא חללים קטנים מאוד בין קירות פנימיים.", ex: "חשוב שיישאר מסומן ב-V לחלקים שעומדים בעומס פיזי." },
                        { name: "Perimeter generator / מחולל הקירות (Arachne)", desc: "מנוע שמחשב קירות ומשנה את העובי תוך כדי תנועה.", ex: "להשאיר תמיד על Arachne. משפר דרמטית טקסטים ופרטים זעירים." },
                        { name: "Fuzzy Skin / טקסטורה מחוספסת", desc: "מרעיד את המדפסת בזמן הדפסת קירות ליצירת מרקם דמוי עור/יציקה.", ex: "מושלם לגריפים לאופניים מ-TPU גמיש, מונע החלקה." },
                        { name: "Fuzzy skin thickness / עובי החספוס", desc: "עד כמה המרקם המחוספס יבלוט החוצה.", ex: "0.3 מ\"מ ייתן חספוס מורגש אבל לא גס מדי." },
                        { name: "Fuzzy skin point distance / מרחק נקודות החספוס", desc: "קובע את המרחק בין כל פצפוץ של חספוס.", ex: "0.8 מ\"מ נותן מראה מקצועי." },
                        { name: "Single perimeter on top surfaces / קיר בודד במשטחים עליונים", desc: "מדפיס רק קיר אחד בשכבות העליונות למראה רציף ואחיד.", ex: "משפר גימור של מחזיקי מפתחות שטוחים, פחות מומלץ לעמידות מכנית." },
                        { name: "Only one perimeter on first layer / קיר בודד בשכבה הראשונה", desc: "מדפיס רק קיר אחד בשכבה שנוגעת במשטח.", ex: "לפעמים עוזר להקטין 'רגל פיל', לרוב נשאיר כבוי." }
                    ]
                },
                infill: {
                    title: "מילוי (Infill)",
                    data: [
                        { name: "Fill density / צפיפות המילוי", desc: "אחוז הפלסטיק בתוך המודל. 0% זה חלול, 100% זה מלא.", ex: "לאמוניט יספיק 10-15%, לחלק מכני באופניים כדאי 40% ומעלה." },
                        { name: "Fill pattern / צורת המילוי", desc: "התבנית ההנדסית של רשת המילוי.", ex: "תבנית 'Gyroid' מומלצת ל-PETG. 'Grid' מהיר לדברים פשוטים." },
                        { name: "Length of the infill anchor / אורך עוגן המילוי", desc: "כמה קווי המילוי ייכנסו לקירות הפנימיים כדי להיאחז.", ex: "משפר משמעותית את החוזק המבני של חלקי אופני הרים." },
                        { name: "Maximum length of the infill anchor / אורך מקסימלי לעוגן המילוי", desc: "מגביל את אורך החדירה לקיר למניעת בליטות חיצוניות.", ex: "ברירת המחדל מונעת פגיעה במראה החיצוני החלק." },
                        { name: "Top fill pattern / צורת מילוי עליונה", desc: "תבנית השכבות העליונות ביותר (הגג).", ex: "'Monotonic Lines' נותן גימור יפה ואחיד מאוד לגג." },
                        { name: "Bottom fill pattern / צורת מילוי תחתונה", desc: "תבנית השכבות התחתונות שנוגעות במשטח.", ex: "לרוב נשאיר 'Monotonic' למראה אחיד ונקי לתחתית." },
                        { name: "Enable ironing / הפעלת גיהוץ", desc: "ראש ההדפסה עובר שוב כמעט ללא פלסטיק, כדי להחליק את השכבה בעזרת חום.", ex: "מושלם למחזיקי מפתחות בדוכן, מאריך את זמן ההדפסה." },
                        { name: "Ironing Type / סוג גיהוץ", desc: "קובע איפה לבצע את הגיהוץ (רק למעלה או בכל מדרגה).", ex: "לרוב נבחר 'All top surfaces' להחלקת כל משטח שפונה מעלה." },
                        { name: "Flow rate / קצב זרימה (בגיהוץ)", desc: "אחוז הפלסטיק המזערי שיוצא בזמן הגיהוץ למילוי חריצים.", ex: "15% לרוב נותן תוצאה חלקה. אם יש עודף פלסטיק, מורידים." },
                        { name: "Spacing between ironing passes / מרווח בין מעברי הגיהוץ", desc: "המרחק בין כל שורה שהראש עושה כשהוא מגהץ.", ex: "מרחק קטן כמו 0.1 מ\"מ ייתן גימור אחיד ויפה יותר." },
                        { name: "Automatic infill combination / שילוב מילוי אוטומטי", desc: "מדפיס מילוי בשכבות עבות יותר מאשר הקירות לחיסכון בזמן.", ex: "אם מדפיסים קירות ב-0.2 מ\"מ, המילוי יכול להיות 0.4 מ\"מ (2 יחד)." },
                        { name: "Automatic infill combination - Max layer height / גובה מקסימלי לשילוב", desc: "הגבול העליון לעובי שילוב השכבות במילוי.", ex: "נשאיר על 100% כדי לתת לתוכנה לחשב את המקסימום." },
                        { name: "Combine infill every / שילוב מילוי כל X שכבות", desc: "מגדיר כל כמה שכבות קיר להדפיס שכבת מילוי אחת עבה.", ex: "לרוב מוגדר 1, אבל העלאה תחסוך זמן בחלקים שמנמנים." },
                        { name: "Solid infill every / מילוי מלא כל X שכבות", desc: "מכריח שכבה מלאה ב-100% פלסטיק כל כמה שכבות מילוי רשת.", ex: "מוסיף קשיחות למבנה גבוה של חלק מאופניים. לרוב נשאיר 0." },
                        { name: "Fill angle / זווית המילוי", desc: "הזווית שבה יתחילו קווי המילוי ביחס למשטח.", ex: "45 מעלות עובד הכי טוב לרוב תבניות המילוי." },
                        { name: "Solid infill threshold area / סף שטח למילוי מלא", desc: "חללים קטנים מהמספר הזה ימולאו 100% במקום רשת.", ex: "עוזר לחזק עמודים קטנים או חלקים צרים בתוך המודל." },

    let currentMainTab = 'print';

    function switchMainTab(tabKey) {
        currentMainTab = tabKey;
        
        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.main-tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabKey));
        if (activeBtn) activeBtn.classList.add('active');
        
        const sidebar = document.getElementById('sidebar-menu');
        sidebar.innerHTML = '';
        
        const subtabs = database[tabKey].subtabs;
        const subtabKeys = Object.keys(subtabs);
        
        subtabKeys.forEach((subKey, index) => {
            const btn = document.createElement('button');
            btn.className = 'sub-tab-btn';
            if (index === 0) btn.classList.add('active');
            btn.innerText = subtabs[subKey].title;
            btn.onclick = (e) => switchSubTab(subKey, e);
            sidebar.appendChild(btn);
        });
        
        if (subtabKeys.length > 0) {
            switchSubTab(subtabKeys[0]);
        }
        
        // נקה חיפוש בעת מעבר לשונית ראשית
        document.getElementById('search-box').value = '';
    }

    function switchSubTab(subKey, event) {
        if (event) {
            document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        const settingsList = document.getElementById('settings-list');
        settingsList.innerHTML = '';
        
        const items = database[currentMainTab].subtabs[subKey].data;
        renderItems(items, settingsList);
    }

    function renderItems(items, container, showBadge = false) {
        items.forEach(item => {
            const row = document.createElement('tr');
            row.className = 'setting-row';
            
            let badgeHtml = '';
            if (showBadge && item.categoryTitle) {
                badgeHtml = `<div class="search-badge">${item.categoryTitle}</div>`;
            }
            
            row.innerHTML = `
                <td>
                    <div class="setting-name">
                        ${item.name}
                        <div class="tooltip">
                            <div class="tooltip-title">${item.name.split('/')[1]?.trim() || item.name}</div>
                            <div><strong>הסבר:</strong> ${item.desc}</div>
                            <div class="tooltip-example"><strong>דוגמה מעשית:</strong> ${item.ex}</div>
                        </div>
                    </div>
                    <br>${badgeHtml}
                </td>
                <td style="color: #b9bbbe; font-size: 14px; line-height: 1.4;">
                    ${item.desc}
                </td>
            `;
            
            container.appendChild(row);
        });
    }

    function handleSearch() {
        const query = document.getElementById('search-box').value.toLowerCase().trim();
        const settingsList = document.getElementById('settings-list');
        
        if (query === '') {
            // חזור למצב רגיל
            const activeSubTab = document.querySelector('.sub-tab-btn.active');
            if (activeSubTab) {
                activeSubTab.click();
            } else {
                switchMainTab(currentMainTab);
            }
            return;
        }

        // ביטול סימון בתפריט צד בזמן חיפוש
        document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
        settingsList.innerHTML = '';
        
        let results = [];

        // חיפוש בכל מסד הנתונים
        for (const mainKey in database) {
            for (const subKey in database[mainKey].subtabs) {
                const subtabData = database[mainKey].subtabs[subKey];
                subtabData.data.forEach(item => {
                    if (item.name.toLowerCase().includes(query) || 
                        item.desc.toLowerCase().includes(query) || 
                        item.ex.toLowerCase().includes(query)) {
                        
                        // יצירת עותק של הפריט כדי להוסיף לו תגית של המיקום
                        results.push({
                            ...item,
                            categoryTitle: `${database[mainKey].subtabs[subKey].title}`
                        });
                    }
                });
            }
        }

        if (results.length > 0) {
            renderItems(results, settingsList, true);
        } else {
            settingsList.innerHTML = `
                <tr>
                    <td colspan="2" style="text-align:center; padding: 30px; color: var(--prusa-orange);">
                        לא נמצאו תוצאות לחיפוש: "<strong>${query}</strong>"
                    </td>
                </tr>
            `;
        }
    }

    // הפעלה ראשונית של האתר
    switchMainTab('print');
</script>
