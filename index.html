<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrusaSlicer מדריך הגדרות אישי</title>
    <style>
        :root {
            --prusa-orange: #e76f51;
            --bg-main: #202225;
            --bg-sidebar: #2f3136;
            --bg-content: #36393f;
            --text-main: #dcddde;
            --text-light: #ffffff;
            --border-color: #4f545c;
            --tooltip-bg: #f4f1de;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2f3136;
            border-bottom: 3px solid var(--prusa-orange);
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--prusa-orange);
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #b9bbbe;
        }
        
        .main-tabs {
            display: flex;
            background-color: #2f3136;
            padding: 0 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .main-tab-btn {
            background: none;
            color: #b9bbbe;
            border: none;
            padding: 15px 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .main-tab-btn:hover {
            color: var(--text-light);
            background-color: rgba(255,255,255,0.05);
        }

        .main-tab-btn.active {
            color: var(--prusa-orange);
            border-bottom: 3px solid var(--prusa-orange);
            background-color: rgba(231, 111, 81, 0.05);
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            min-width: 250px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding-top: 10px;
        }

        .sub-tab-btn {
            display: block;
            width: 100%;
            text-align: right;
            background: none;
            border: none;
            color: #b9bbbe;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.1s;
            border-right: 4px solid transparent;
        }

        .sub-tab-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-light);
        }

        .sub-tab-btn.active {
            color: var(--text-light);
            background-color: #40444b;
            font-weight: bold;
            border-right: 4px solid var(--prusa-orange);
        }

        .content-area {
            flex: 1;
            background-color: var(--bg-content);
            padding: 20px;
            overflow-y: auto;
        }

        .settings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .settings-table th {
            text-align: right;
            background-color: #2f3136;
            color: var(--prusa-orange);
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .settings-table td {
            padding: 15px 12px;
            border: 1px solid var(--border-color);
            vertical-align: top;
        }

        .setting-row:nth-child(even) {
            background-color: rgba(255,255,255,0.02);
        }

        .setting-name {
            font-weight: bold;
            color: var(--text-light);
            cursor: help;
            position: relative;
            display: inline-block;
            border-bottom: 1px dashed #b9bbbe;
            padding-bottom: 2px;
            font-size: 14px;
        }

        .setting-name:hover {
            color: var(--prusa-orange);
            border-bottom-color: var(--prusa-orange);
        }

        .tooltip {
            visibility: hidden;
            width: 380px;
            background-color: var(--tooltip-bg);
            color: #2b2d42;
            text-align: right;
            border-radius: 8px;
            padding: 15px;
            position: absolute;
            z-index: 999;
            bottom: 130%;
            right: 0;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.2s;
            border: 3px solid var(--prusa-orange);
            font-size: 14px;
            line-height: 1.6;
            font-weight: normal;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 30px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--prusa-orange) transparent transparent transparent;
        }

        .setting-name:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-title {
            font-weight: bold;
            color: #e76f51;
            margin-bottom: 10px;
            border-bottom: 2px solid #2b2d42;
            padding-bottom: 5px;
            font-size: 16px;
        }

        .tooltip-example {
            margin-top: 12px;
            background-color: rgba(231, 111, 81, 0.12);
            padding: 10px;
            border-right: 4px solid var(--prusa-orange);
            border-radius: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <h1>PrusaSlicer - המילון המלא להגדרות</h1>
    <p>העבר את סמן העכבר מעל המונחים המקווקווים כדי לחשוף את ההסבר המלא והדוגמאות</p>
</header>

<div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchMainTab('print')">הגדרות הדפסה (Print Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('filament')">הגדרות פילמנט (Filament Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('printer')">הגדרות מדפסת (Printer Settings)</button>
</div>

<div class="app-body">
    <div class="sidebar" id="sidebar-menu"></div>
    <div class="content-area">
        <table class="settings-table">
            <thead>
                <tr>
                    <th style="width: 35%;">שם ההגדרה (אנגלית / עברית)</th>
                    <th style="width: 65%;">תיאור מקוצר (לרפרוף)</th>
                </tr>
            </thead>
            <tbody id="settings-list"></tbody>
        </table>
    </div>
</div>

                        { name: "Max print height / גובה הדפסה מקסימלי", desc: "הגובה הפיזי המקסימלי שהמדפסת מסוגלת לעלות אליו בציר ה-Z.", ex: "270 מ\"מ. מאפשר הדפסה של חלקי חילוף גבוהים מבלי להתנגש בתקרת המדפסת." },
                        { name: "G-code flavor / סוג קוד G (קושחה)", desc: "השפה המדויקת שמוח המדפסת מבין.", ex: "'Marlin 2' קריטי שיהיה מוגדר נכון, אחרת המדפסת לא תדע לקרוא את קובץ ההדפסה." },
                        { name: "G-code thumbnails / תמונות ממוזערות", desc: "שומר תמונה של המודל בתוך הקובץ כדי שתוצג על מסך המדפסת עצמה.", ex: "נוח מאוד כדי לזהות חזותית את מחזיק המפתחות לפני שלוחצים Play במדפסת." },
                        { name: "Enable variable layer height feature / אפשר תכונת גובה שכבה משתנה", desc: "פותח כלי להדפסת שכבות עבות ודקות באותו מודל.", ex: "מושלם לכיפות עגולות של אמוניטים - מדפיס מהר למטה, ולאט ועדין בכיפה למניעת מדרגות." }
                    ]
                },
                machine_limits: {
                    title: "מגבלות מכונה (Machine limits)",
                    data: [
                        { name: "Maximum feedrates / מהירויות מקסימליות", desc: "המהירות המקסימלית המותרת לכל ציר מנוע (ב-mm/s).", ex: "במצב 'Stealth' המדפסת תוגבל אוטומטית ל-160 מ\"מ/שנייה כדי להפחית רעשי מנוע." },
                        { name: "Maximum accelerations / תאוצות מקסימליות", desc: "התאוצה המקסימלית (mm/s²) שכל מנוע יכול להפיק.", ex: "כדי למנוע תנועה אלימה וסימני רעידות על שלדת אופניים, ניתן להוריד מ-10,000 ל-5,000 לקבלת גימור חלק." },

                extruder1: {

                    data: [
                        { name: "Nozzle diameter / קוטר דיזה", desc: "קוטר פתח הדיזה במ\"מ.", ex: "0.4 מ\"מ הוא הסטנדרט לאיזון בין מהירות לדיוק, מושלם לפרטים באמוניטים בלי לקחת שעות." },
                        { name: "Layer height limits / גבולות גובה שכבה", desc: "הטווח המותר (מינימום/מקסימום) לגובה השכבה באקסטרודר זה.", ex: "0.07 עד 0.3 מ\"מ. הגבולות מונעים ממך להגדיר שכבה עבה מדי שתתפרק מהדיזה." },
                        { name: "Travel lift / הרמת ראש (Z-Hop)", desc: "הגדרת הרמה אלכסונית (Ramping) של 0.2 מ\"מ בזמן מעבר.", ex: "מונע מהראש להתנגש בפלסטיק קיים ולהרוס את ההדפסה רגע לפני הסיום." },
                        { name: "Retraction / נסיגת חוט", desc: "הגדרות המשיכה של האקסטרודר עצמו: אורך, מהירות וניגוב.", ex: "אורך של 2 מ\"מ מונע את 'השערות' המעצבנות. הגדרות אלו משמשות כברירת המחדל אם הפילמנט לא דרס אותן בעקיפות." }
                    ]
                }
            }
        }
    };

    let currentMainTab = 'print';

    function switchMainTab(tabKey) {
        currentMainTab = tabKey;
        
        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.main-tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabKey));
        if (activeBtn) activeBtn.classList.add('active');
        
        const sidebar = document.getElementById('sidebar-menu');
        sidebar.innerHTML = '';
        
        const subtabs = database[tabKey].subtabs;
        const subtabKeys = Object.keys(subtabs);
        
        subtabKeys.forEach((subKey, index) => {
            const btn = document.createElement('button');
            btn.className = 'sub-tab-btn';
            if (index === 0) btn.classList.add('active');
            btn.innerText = subtabs[subKey].title;
            btn.onclick = (e) => switchSubTab(subKey, e);
            sidebar.appendChild(btn);
        });
        
        if (subtabKeys.length > 0) {
            switchSubTab(subtabKeys[0]);
        }
    }

    function switchSubTab(subKey, event) {
        if (event) {
            document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        const settingsList = document.getElementById('settings-list');
        settingsList.innerHTML = '';
        
        const items = database[currentMainTab].subtabs[subKey].data;
        
        items.forEach(item => {
            const row = document.createElement('tr');
            row.className = 'setting-row';
            
            row.innerHTML = `
                <td>
                    <div class="setting-name">
                        ${item.name}
                        <div class="tooltip">
                            <div class="tooltip-title">${item.name.split('/')[1]?.trim() || item.name}</div>
                            <div><strong>הסבר:</strong> ${item.desc}</div>
                            <div class="tooltip-example"><strong>דוגמה מעשית:</strong> ${item.ex}</div>
                        </div>
                    </div>
                </td>
                <td style="color: #b9bbbe; font-size: 14px; line-height: 1.4;">
                    ${item.desc}
                </td>
            `;
            
            settingsList.appendChild(row);
        });
    }

    // הפעלה ראשונית של האתר
    switchMainTab('print');
</script>
