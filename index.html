<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrusaSlicer מדריך הגדרות אישי</title>
    <style>
        :root {
            --prusa-orange: #e76f51;
            --bg-main: #202225;
            --bg-sidebar: #2f3136;
            --bg-content: #36393f;
            --text-main: #dcddde;
            --text-light: #ffffff;
            --border-color: #4f545c;
            --tooltip-bg: #f4f1de;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #2f3136;
            border-bottom: 3px solid var(--prusa-orange);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            color: var(--prusa-orange);
        }

        header p {
            margin: 0;
            font-size: 13px;
            color: #b9bbbe;
        }
        
        .main-tabs {
            display: flex;
            background-color: #2f3136;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .main-tab-btn {
            background: none;
            color: #b9bbbe;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border-bottom: 3px solid transparent;
            transition: 0.2s;
        }

        .main-tab-btn:hover {
            color: var(--text-light);
            background-color: rgba(255,255,255,0.05);
        }

        .main-tab-btn.active {
            color: var(--prusa-orange);
            border-bottom: 3px solid var(--prusa-orange);
            background-color: rgba(231, 111, 81, 0.05);
        }

        .app-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background-color: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            overflow-y: auto;
            padding-top: 10px;
        }

        .sub-tab-btn {
            display: block;
            width: 100%;
            text-align: right;
            background: none;
            border: none;
            color: #b9bbbe;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.1s;
        }

        .sub-tab-btn:hover {
            background-color: rgba(255,255,255,0.05);
            color: var(--text-light);
        }

        .sub-tab-btn.active {
            color: var(--text-light);
            background-color: #40444b;
            font-weight: bold;
            border-right: 4px solid var(--prusa-orange);
        }

        .content-area {
            flex: 1;
            background-color: var(--bg-content);
            padding: 20px;
            overflow-y: auto;
        }

        .settings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .settings-table th {
            text-align: right;
            background-color: #2f3136;
            color: var(--prusa-orange);
            padding: 10px;
            font-size: 14px;
            border: 1px solid var(--border-color);
        }

        .settings-table td {
            padding: 12px 10px;
            border: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .setting-row:nth-child(even) {
            background-color: rgba(255,255,255,0.02);
        }

        .setting-name {
            font-weight: bold;
            color: var(--text-light);
            cursor: help;
            position: relative;
            display: inline-block;
            border-bottom: 1px dashed #b9bbbe;
            padding-bottom: 2px;
        }

        .setting-name:hover {
            color: var(--prusa-orange);
            border-bottom-color: var(--prusa-orange);
        }

        /* Tooltip חכם וגדול כמו שביקשת */
        .tooltip {
            visibility: hidden;
            width: 380px;
            background-color: var(--tooltip-bg);
            color: #2b2d42;
            text-align: right;
            border-radius: 8px;
            padding: 15px;
            position: absolute;
            z-index: 999;
            bottom: 130%;
            right: 0;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.6);
            opacity: 0;
            transition: opacity 0.2s;
            border: 3px solid var(--prusa-orange);
            font-size: 14px;
            line-height: 1.6;
        }

        .tooltip::after {
            content: "";
            position: absolute;
            top: 100%;
            right: 30px;
            border-width: 8px;
            border-style: solid;
            border-color: var(--prusa-orange) transparent transparent transparent;
        }

        .setting-name:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }

        .tooltip-title {
            font-weight: bold;
            color: #e76f51;
            margin-bottom: 10px;
            border-bottom: 2px solid #2b2d42;
            padding-bottom: 5px;
            font-size: 15px;
        }

        .tooltip-example {
            margin-top: 12px;
            background-color: rgba(231, 111, 81, 0.12);
            padding: 10px;
            border-right: 4px solid var(--prusa-orange);
            border-radius: 4px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header>
    <h1>PrusaSlicer - ממשק עזר אישי בעברית</h1>
    <p>העבר עכבר מעל שם הגדרה מסומנת בקו מקווקו כדי לראות הסבר ודוגמה מעשית</p>
</header>

<div class="main-tabs">
    <button class="main-tab-btn active" onclick="switchMainTab('print')">הגדרות הדפסה (Print Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('filament')">הגדרות פילמנט (Filament Settings)</button>
    <button class="main-tab-btn" onclick="switchMainTab('printer')">הגדרות מדפסת (Printer Settings)</button>
</div>

<div class="app-body">
    <div class="sidebar" id="sidebar-menu"></div>
    <div class="content-area">
        <table class="settings-table">
            <thead>
                <tr>
                    <th style="width: 35%;">שם ההגדרה (אנגלית / עברית)</th>
                    <th style="width: 65%;">הנחיית שימוש מהירה</th>
                </tr>
            </thead>
            <tbody id="settings-list"></tbody>
        </table>
    </div>
</div>

<script>
    const database = {
        print: {
            subtabs: {
                layers: {
                    title: "שכבות והיקפים (Layers & Perimeters)",
                    data: [
                        { name: "Layer height / גובה שכבה", desc: "העובי של כל שכבת הדפסה. מספר קטן ייתן רזולוציה חלקה ואיכותית, אבל ההדפסה תיקח יותר זמן.", ex: "אם מדפיסים מחזיק מפתחות של אמוניט עם פרטים קטנים, כדאי 0.12 מ\"מ. לחלק פשוט אפשר 0.28 מ\"מ." },
                        { name: "First layer height / גובה שכבה ראשונה", desc: "עובי השכבה הראשונה שנדבקת למשטח. לרוב מגדירים אותה עבה יותר משאר השכבות כדי להבטיח אחיזה טובה למשטח ההדפסה ולפצות על חוסר איזון קל במיטה.", ex: "כמעט תמיד נשאיר על 0.2 מ\"מ, גם אם מדפיסים מחזיק מפתחות של אמוניט ברזולוציה גבוהה, כדי למנוע ניתוק של המודל מהמשטח באמצע העבודה." },
                        { name: "Perimeters / קירות (היקף)", desc: "מספר קווי המתאר שיוצרים את המעטפת החיצונית של המודל.", ex: "למודל ליופי על המדף מספיק 2 קירות. לחלק שצריך להיות חזק ועמיד מ-PETG או ABS, כדאי לשים 4 קירות או יותר." },
                        { name: "Spiral vase / מצב אגרטל (ספירלה)", desc: "מדפיס את המודל מקו מתאר (קיר) אחד בודד ורציף שעולה בספירלה, ללא תפרים וללא מילוי פנימי. המודל יוצא חלול ודק.", ex: "מעולה להדפסת מודלים דקורטיביים כמו אהילים. לא מתאים בכלל לחלקי חילוף לאופני הרים או חלקים מ-PETG ו-ABS שדורשים קשיחות וחוזק מבני." },
                        { name: "Minimum shell thickness / עובי מעטפת מינימלי", desc: "הגדרה שמוודאת שהגג והרצפה של המודל לא יהיו דקים מדי. התוכנה תוסיף שכבות מלאות באופן אוטומטי (Top/Bottom) כדי להגיע לעובי המילימטרי שהגדרת כאן.", ex: "לחלק שצריך לעמוד בתנאי שטח על האופניים, הגדרה של לפחות 1 מ\"מ תבטיח שהמעטפת העליונה והתחתונה שלו יהיו אטומות וקשיחות." },
                        { name: "Extra perimeters if needed / קירות נוספים לפי הצורך", desc: "נותן אישור לתוכנה להוסיף קירות פנימיים באופן אוטומטי באזורים שיש בהם שיפועים חדים, כדי למנוע חורים במעטפת של המודל.", ex: "אם מדפיסים חלק עם שיפוע אלכסוני חזק, התוכנה תעבה את הפלסטיק מבפנים כדי שהקיר החיצוני לא יקרוס." },
                        { name: "Solid layers / שכבות מלאות (עליון/תחתון)", desc: "קובע כמה שכבות של פלסטיק מלא ב-100% יודפסו בתחתית המודל ובחלקו העליון, כדי לסגור אותו בצורה חלקה והרמטית.", ex: "לחלקי פלסטיק לאופניים שצריכים להיות חזקים ועמידים לשטח, מומלץ להגדיר לפחות 4 או 5 שכבות עליונות ותחתונות. לחלקים קישוטיים מספיק 3." }
                    ]
                },
                infill: {
                    title: "מילוי (Infill)",
                    data: [
                        { name: "Fill density / צפיפות המילוי", desc: "אחוז הפלסטיק שייבנה בתוך המודל. 0% זה חלול, 100% זה גוש מלא.", ex: "מודל פשוט יכול להיות עם 10% מילוי. לחלק מכני שצריך לעמוד בעומס באופניים כדאי 40% ומעלה." },
                        { name: "Fill pattern / צורת המילוי", desc: "הצורה ההנדסית של רשת התמיכה הפנימית בתוך המודל. יש תבניות שיותר מהירות להדפסה, ויש תבניות שנותנות למודל חוזק שווה בכל הכיוונים.", ex: "צורת מילוי מסוג 'Gyroid' מומלצת מאוד לחלקים חזקים מ-PETG או ABS. להדפסה מהירה של מחזיק מפתחות אפשר להשתמש ב-'Grid' או 'Rectilinear'." },
                        { name: "Length of the infill anchor / אורך עוגן המילוי", desc: "כמה מילימטרים קווי המילוי ייכנסו לתוך הקירות הפנימיים כדי \"להיאחז\" בהם.", ex: "משפר משמעותית את החוזק המבני של חלקי אופני הרים כדי שהמילוי לא יתנתק מהקיר תחת לחץ." },
                        { name: "Enable ironing / הפעלת גיהוץ", desc: "ראש ההדפסה עובר שוב על השכבה העליונה החשופה, כמעט ללא הוצאת פלסטיק, כדי להחליק אותה בעזרת החום של הדיזה.", ex: "מושלם לקבלת פני שטח חלקים לגמרי במחזיקי מפתחות שנמכרים בדוכן, אבל מאריך מאוד את זמן ההדפסה." },
                        { name: "Solid infill threshold area / סף שטח למילוי מלא", desc: "אם יש חלל פנימי במודל שקטן מהמספר הזה (בממ\"ר), המדפסת תמלא אותו בפלסטיק 100% במקום לעשות בו רשת.", ex: "עוזר לחזק עמודים קטנים או חלקים צרים מאוד בתוך המודל." }
                    ]
                },
                skirt_brim: {
                    title: "חצאית ושוליים (Skirt & Brim)",

                        { name: "Draft shield / מגן רוח (חומת טמפרטורה)", desc: "בונה חומת פלסטיק גבוהה שמקיפה את המודל לכל גובהו כדי להגן עליו מרוחות ושינויי טמפרטורה בחדר.", ex: "מצוין אם מדפיסים חלקי חילוף מכניים לאופני הרים מ-ABS ורוצים למנוע מהם להתכווץ או להיסדק באמצע ההדפסה." },
                        { name: "Brim type / סוג שוליים", desc: "קובע איפה יודפס משטח ההדבקה הנוסף שעוזר לעגן את המודל למשטח (בחוץ, בפנים, או גם וגם).", ex: "'Outer brim only' (רק בחוץ) הוא הנפוץ ביותר ועוזר למנוע מהמודל להתרומם ולהתעקם בפינות." },
                        { name: "Brim width / רוחב השוליים", desc: "העובי במילימטרים של משטח ההדבקה שייבנה מסביב לבסיס המודל.", ex: "לחלקים גבוהים וצרים מ-PETG שעלולים ליפול עקב תנודות המדפסת, כדאי להגדיר לפחות 5 מ\"מ כדי לייצב אותם." }
                    ]
                },
                supports: {
                    title: "חומר תמיכה (Support Material)",
                    data: [
                        { name: "Generate support material / יצירת חומר תמיכה", desc: "מתג ההפעלה או הכיבוי הראשי להדפסת תמיכות למודל.", ex: "חובה לסמן ב-V אם מדפיסים חלק שיש בו זוויות קשות שמרחפות באוויר ועלולות ליפול ללא בסיס מתחתיהן." },

                        { name: "Tip Diameter / קוטר הקצה (הטיפ)", desc: "העובי של השפיץ בקצה הענף האורגני, בדיוק בנקודה שנוגעת במודל.", ex: "0.8 מ\"מ מאפשר לענף להתחבר בנקודה זעירה למודל, ולכן התמיכה תנשור כמעט מעצמה בסוף עם מינימום סימנים." }

                speed: {

                    ]
                },
                multiextruders: {
                    title: "אקסטרודרים מרובים (Multiple Extruders)",

    let currentMainTab = 'print';

    function switchMainTab(tabKey) {
        currentMainTab = tabKey;
        
        document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(document.querySelectorAll('.main-tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabKey));
        if (activeBtn) activeBtn.classList.add('active');
        
        const sidebar = document.getElementById('sidebar-menu');
        sidebar.innerHTML = '';
        
        const subtabs = database[tabKey].subtabs;
        const subtabKeys = Object.keys(subtabs);
        
        subtabKeys.forEach((subKey, index) => {
            const btn = document.createElement('button');
            btn.className = 'sub-tab-btn';
            if (index === 0) btn.classList.add('active');
            btn.innerText = subtabs[subKey].title;
            btn.onclick = (e) => switchSubTab(subKey, e);
            sidebar.appendChild(btn);
        });
        
        if (subtabKeys.length > 0) {
            switchSubTab(subtabKeys[0]);
        }
    }

    function switchSubTab(subKey, event) {
        if (event) {
            document.querySelectorAll('.sub-tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        const settingsList = document.getElementById('settings-list');
        settingsList.innerHTML = '';
        
        const items = database[currentMainTab].subtabs[subKey].data;
        
        items.forEach(item => {
            const row = document.createElement('tr');
            row.className = 'setting-row';
            
            row.innerHTML = `
                <td>
                    <div class="setting-name">
                        ${item.name}
                        <div class="tooltip">
                            <div class="tooltip-title">${item.name.split('/')[1]?.trim() || item.name}</div>
                            <div><strong>הסבר:</strong> ${item.desc}</div>
                            <div class="tooltip-example"><strong>דוגמה מעשית:</strong> ${item.ex}</div>
                        </div>
                    </div>
                </td>
                <td style="color: #b9bbbe; font-size: 13px;">העבר עכבר על השם משמאל לקבלת ההסבר המלא והדוגמה המעשית.</td>
            `;
            
            settingsList.appendChild(row);
        });
    }

    switchMainTab('print');
</script>
